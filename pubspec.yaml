name: fyniq
description: "Outsmart your spending."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5
  drift: ^2.18.0
  drift_flutter: ^0.1.0
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  local_auth: ^2.3.0
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.3.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  permission_handler: ^11.3.1
  flutter_svg: ^2.0.10+1
  iconsax_flutter: ^1.0.0
  emoji_picker_flutter: ^2.2.0
  flutter_launcher_icons: ^0.14.1
  path_provider: ^2.1.3

  path: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.18.0
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0

flutter_launcher_icons:
  android: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  min_sdk_android: 23

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
    - assets/icons/
